<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed | Raspex</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    .success-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .success-box { max-width: 520px; }
    .success-icon { font-size: 3rem; margin-bottom: 1.5rem; }
    .success-box h1 { margin-bottom: 1rem; }
    .success-box p { color: var(--muted); margin-bottom: 2rem; line-height: 1.7; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">RASPEX</a>
    </div>
  </nav>
  <div class="success-page">
    <div class="success-box">
      <div class="success-icon">&#10003;</div>
      <p class="section-label">Order Confirmed</p>
      <h1>Thank You for Your Order</h1>
      <p>Your Raspex order is confirmed and on its way. You'll receive a confirmation email shortly with your order details and tracking information.</p>
      <a href="/" class="btn-primary">Continue Shopping</a>
    </div>
  </div>
</body>
</html>
