<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&amp;family=Montserrat:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Raspberry icon -->
  <g transform="translate(32, 40)">
    <!-- Berry drupelets -->
    <circle cx="20" cy="22" r="6.5" fill="#8B1A3A"/>
    <circle cx="31" cy="17" r="6.5" fill="#8B1A3A"/>
    <circle cx="42" cy="22" r="6.5" fill="#8B1A3A"/>
    <circle cx="14" cy="32" r="6.5" fill="#8B1A3A"/>
    <circle cx="25" cy="30" r="6.5" fill="#8B1A3A"/>
    <circle cx="36" cy="30" r="6.5" fill="#8B1A3A"/>
    <circle cx="47" cy="32" r="6.5" fill="#8B1A3A"/>
    <circle cx="20" cy="41" r="6.5" fill="#8B1A3A"/>
    <circle cx="31" cy="43" r="6.5" fill="#8B1A3A"/>
    <circle cx="42" cy="41" r="6.5" fill="#8B1A3A"/>
    <!-- Shine dots -->
    <circle cx="18" cy="20" r="1.8" fill="rgba(255,255,255,0.35)"/>
    <circle cx="29" cy="15" r="1.8" fill="rgba(255,255,255,0.35)"/>
    <circle cx="40" cy="20" r="1.8" fill="rgba(255,255,255,0.35)"/>
    <!-- Leaf -->
    <path d="M31 10 Q20 2 14 8 Q22 6 31 10Z" fill="#2D5A1B"/>
    <path d="M31 10 Q42 2 48 8 Q40 6 31 10Z" fill="#3A7024"/>
    <line x1="31" y1="10" x2="31" y2="16" stroke="#2D5A1B" stroke-width="1.2"/>
  </g>

  <!-- RASPEX wordmark -->
  <text x="102" y="75" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="400" letter-spacing="10" fill="#1A1A1A">RASPEX</text>

  <!-- Thin divider line -->
  <line x1="102" y1="88" x2="372" y2="88" stroke="#8B1A3A" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="102" y="108" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="300" letter-spacing="4" fill="#6B6B6B">PREMIUM RASPBERRY SKINCARE</text>

  <!-- Est. -->
  <text x="102" y="126" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#8B1A3A" letter-spacing="2">Est. 1993</text>
</svg>
